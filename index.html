<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアル目玉シールカメラ V5</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: sans-serif;
            touch-action: none;
        }
        #app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #camera-video { width: 100%; height: 100%; object-fit: cover; }

        /* コントロールパネル */
        #control-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            padding: 12px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 10; box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            max-height: 80vh; overflow-y: auto; width: 220px;
        }
        .panel-section { border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; margin-bottom: 5px; }
        .panel-title { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; display: block; }
        
        details.accordion { border-top: 1px solid rgba(0,0,0,0.1); padding-top: 5px; }
        details.accordion summary {
            font-size: 12px; font-weight: bold; color: #555;
            cursor: pointer; outline: none; user-select: none; list-style: none;
        }
        details.accordion summary::-webkit-details-marker { display: none; }
        details.accordion summary::after { content: " ▼"; font-size: 10px; float: right; margin-top: 2px; }
        details.accordion[open] summary::after { content: " ▲"; }
        .accordion-content { margin-top: 10px; }

        .slider-group {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 11px; font-weight: bold; color: #333; margin-bottom: 4px;
        }
        .slider-group input { width: 100px; }

        /* --- リアル目玉シール (カプセル) --- */
        .eye {
            position: absolute;
            /* カプセルの透明感と光沢をグラデーションで表現 */
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.12) 100%);
            border-radius: 50%;
            /* 立体感を出すためのエッジ */
            border: 1px solid rgba(255, 255, 255, 0.3);
            /* 立体的な影 */
            box-shadow: 2px 5px 15px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.2);
            cursor: grab;
            transform: translate(-50%, -50%);
            z-index: 5;
            overflow: visible; /* 擬似要素を表示するため */
        }
        
        /* 擬似要素 ::before でカプセルの底にある白目を表現 */
        .eye::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px; /* borderの内側 */
            background: white;
            border-radius: 50%;
            z-index: -1; /* カプセル(本体)の下に配置 */
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1); /* 白目の縁の影 */
        }

        /* 擬似要素 ::after でカプセル表面の強いハイライトを表現 */
        .eye::after {
            content: '';
            position: absolute;
            top: 15%; left: 15%;
            width: 30%; height: 30%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(1.5px); /* 少しぼかしてリアルに */
            transform: rotate(-15deg);
            z-index: 10; /* 黒目の上に配置 */
            pointer-events: none;
        }

        .pupil {
            position: absolute; background: black; border-radius: 50%;
            top: 50%; left: 50%;
            pointer-events: none;
            z-index: 5; /* カプセル::beforeの上、::afterの下 */
            /* 黒目の立体感 */
            box-shadow: inset 0 0 4px rgba(255,255,255,0.3);
        }

        #shutter-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; background: #fff;
            border: 6px solid #ddd; border-radius: 50%; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #shutter-btn:active { background: #eee; transform: translateX(-50%) scale(0.95); }
        
        #start-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        #start-btn { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; background: #ffeb3b; color: #333; font-weight: bold; }
        
        #preview-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50;
        }
        #preview-img { max-width: 90%; max-height: 75%; border-radius: 10px; border: 2px solid white; }
        .preview-controls { margin-top: 20px; display: flex; gap: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <video id="camera-video" autoplay playsinline></video>
    
    <div id="control-panel">
        <div class="panel-section" style="border:none;">
            <span class="panel-title">全体サイズ</span>
            <div class="slider-group">
                <label>カプセル</label>
                <input type="range" id="white-slider" min="10" max="120" value="80">
            </div>
            <div class="slider-group">
                <label>黒目</label>
                <input type="range" id="black-slider" min="5" max="100" value="40">
            </div>
        </div>

        <details class="accordion">
            <summary>位置微調整を開く</summary>
            <div class="accordion-content">
                <div class="panel-section">
                    <span class="panel-title">左目</span>
                    <div class="slider-group">
                        <label>左右</label>
                        <input type="range" id="lx-slider" min="-50" max="50" value="0">
                    </div>
                    <div class="slider-group">
                        <label>上下</label>
                        <input type="range" id="ly-slider" min="-50" max="50" value="0">
                    </div>
                </div>

                <div class="panel-section" style="border:none; padding-bottom:0; margin-bottom:0;">
                    <span class="panel-title">右目</span>
                    <div class="slider-group">
                        <label>左右</label>
                        <input type="range" id="rx-slider" min="-50" max="50" value="0">
                    </div>
                    <div class="slider-group">
                        <label>上下</label>
                        <input type="range" id="ry-slider" min="-50" max="50" value="0">
                    </div>
                </div>
            </div>
        </details>
    </div>

    <div id="eye1" class="eye" style="left: 35%; top: 40%;"><div class="pupil" id="pupil1"></div></div>
    <div id="eye2" class="eye" style="left: 65%; top: 40%;"><div class="pupil" id="pupil2"></div></div>

    <button id="shutter-btn"></button>

    <div id="start-screen">
        <button id="start-btn">スタート<br><small>(カメラとセンサーの許可)</small></button>
    </div>

    <div id="preview-screen">
        <img id="preview-img" src="">
        <div class="preview-controls">
            <button id="close-btn" style="padding:10px 20px; background:#ddd; border:none; border-radius:20px;">戻る</button>
            <button id="download-btn" style="padding:10px 20px; background:#4CAF50; color:white; border:none; border-radius:20px; font-weight:bold;">画像を保存</button>
        </div>
    </div>
</div>

<script>
    let whiteSize = 80;
    let blackSize = 40;
    let offsets = [ { x: 0, y: 0 }, { x: 0, y: 0 } ];

    const whiteSlider = document.getElementById('white-slider');
    const blackSlider = document.getElementById('black-slider');
    const lxS = document.getElementById('lx-slider');
    const lyS = document.getElementById('ly-slider');
    const rxS = document.getElementById('rx-slider');
    const ryS = document.getElementById('ry-slider');

    const eyes = [document.getElementById('eye1'), document.getElementById('eye2')];
    const pupils = [document.getElementById('pupil1'), document.getElementById('pupil2')];
    const video = document.getElementById('camera-video');

    function updateParams() {
        whiteSize = parseInt(whiteSlider.value);
        blackSize = parseInt(blackSlider.value);
        
        if (blackSize > whiteSize - 4) {
            blackSize = Math.max(2, whiteSize - 4);
            blackSlider.value = blackSize;
        }

        offsets[0].x = (parseInt(lxS.value) / 100) * whiteSize;
        offsets[0].y = (parseInt(lyS.value) / 100) * whiteSize;
        offsets[1].x = (parseInt(rxS.value) / 100) * whiteSize;
        offsets[1].y = (parseInt(ryS.value) / 100) * whiteSize;

        eyes.forEach(eye => {
            eye.style.width = whiteSize + 'px';
            eye.style.height = whiteSize + 'px';
        });

        pupils.forEach(pupil => {
            pupil.style.width = blackSize + 'px';
            pupil.style.height = blackSize + 'px';
            pupil.style.marginTop = -(blackSize / 2) + 'px';
            pupil.style.marginLeft = -(blackSize / 2) + 'px';
        });
    }

    [whiteSlider, blackSlider, lxS, lyS, rxS, ryS].forEach(s => s.addEventListener('input', updateParams));
    updateParams();

    function makeDraggable(el) {
        let isDragging = false;
        el.addEventListener('pointerdown', (e) => { isDragging = true; el.setPointerCapture(e.pointerId); });
        el.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            el.style.left = e.clientX + 'px';
            el.style.top = e.clientY + 'px';
        });
        el.addEventListener('pointerup', (e) => { isDragging = false; el.releasePointerCapture(e.pointerId); });
    }
    eyes.forEach(makeDraggable);

    let ax = 0, ay = 0;
    const physicsData = [ { x: 0, y: 0, vx: 0, vy: 0 }, { x: 0, y: 0, vx: 0, vy: 0 } ];

    window.addEventListener('devicemotion', (e) => {
        if (e.acceleration) {
            ax = e.acceleration.x || 0;
            ay = e.acceleration.y || 0;
        }
    });

    function updatePhysics() {
        const maxRadius = (whiteSize - blackSize) / 2;

        for (let i = 0; i < 2; i++) {
            let p = physicsData[i];
            let targetX = offsets[i].x;
            let targetY = offsets[i].y;

            p.vx -= ax * 1.5;
            p.vy += ay * 1.5;
            p.vx -= (p.x - targetX) * 0.1;
            p.vy -= (p.y - targetY) * 0.1;
            p.vx *= 0.8;
            p.vy *= 0.8;
            p.x += p.vx;
            p.y += p.vy;

            const dist = Math.hypot(p.x, p.y);
            if (dist > maxRadius) {
                p.x = (p.x / dist) * maxRadius;
                p.y = (p.y / dist) * maxRadius;
                p.vx *= -0.4;
                p.vy *= -0.4;
            }

            pupils[i].style.transform = `translate(${p.x}px, ${p.y}px)`;
        }
        requestAnimationFrame(updatePhysics);
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
        } catch(err) { alert('カメラエラー: ' + err.message); }
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
        }
        document.getElementById('start-screen').style.display = 'none';
        startCamera();
        updatePhysics();
    });

    // シャッター（Canvas描画）をリアルな見た目にアップデート
    document.getElementById('shutter-btn').addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        const rect = document.getElementById('app-container').getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        const ctx = canvas.getContext('2d');

        // ① カメラ映像描画
        const vRatio = video.videoWidth / video.videoHeight;
        const cRatio = canvas.width / canvas.height;
        let dw, dh, ox, oy;
        if (vRatio > cRatio) { dh = canvas.height; dw = canvas.height * vRatio; ox = (canvas.width - dw) / 2; oy = 0; }
        else { dw = canvas.width; dh = canvas.width / vRatio; ox = 0; oy = (canvas.height - dh) / 2; }
        ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, ox, oy, dw, dh);

        // ② 目玉（カプセル）描画
        for (let i = 0; i < 2; i++) {
            const eyeRect = eyes[i].getBoundingClientRect();
            const cx = eyeRect.left + eyeRect.width / 2;
            const cy = eyeRect.top + eyeRect.height / 2;
            const radius = whiteSize / 2;

            // 1. カプセルの立体的な影（drop-shadow）を描画
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.filter = 'blur(4px)'; // CSSのblurを模倣
            ctx.beginPath();
            ctx.arc(cx + 2, cy + 4, radius, 0, Math.PI * 2); // 影の位置をオフセット
            ctx.fill();
            ctx.restore();

            // 2. 白目の底 (::before)
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(cx, cy, radius - 1, 0, Math.PI * 2); // borderの内側
            ctx.fill();

            // 3. カプセル本体の透明感と光沢 (background: radial-gradient)
            ctx.save();
            const capGrad = ctx.createRadialGradient(cx - radius*0.3, cy - radius*0.3, radius*0.1, cx, cy, radius);
            capGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)'); // 光沢
            capGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0)'); // 透明
            capGrad.addColorStop(1, 'rgba(0, 0, 0, 0.08)'); // 影
            ctx.fillStyle = capGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 4. 黒目 (.pupil)
            const px = cx + physicsData[i].x;
            const py = cy + physicsData[i].y;
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(px, py, blackSize / 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 黒目の立体感（軽いハイライト）
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(px - blackSize*0.2, py - blackSize*0.2, blackSize * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 5. カプセル表面の強いハイライト (::after)
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.filter = 'blur(1.5px)'; // CSSのfilter: blur
            ctx.beginPath();
            // 左上にオフセットされた白い楕円
            ctx.ellipse(cx - radius*0.4, cy - radius*0.4, radius*0.3, radius*0.2, -Math.PI/12, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        document.getElementById('preview-img').src = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('preview-screen').style.display = 'flex';
    });

    document.getElementById('close-btn').addEventListener('click', () => {
        document.getElementById('preview-screen').style.display = 'none';
    });
    document.getElementById('download-btn').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = document.getElementById('preview-img').src;
        a.download = 'real_eye_sticker_photo.jpg';
        a.click();
    });
</script>
</body>
</html>
