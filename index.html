<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアル目玉シールカメラ V10 (パネル移動・開閉対応)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: sans-serif;
            touch-action: none; /* スワイプによるスクロールを無効化 */
        }
        #app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #camera-video { width: 100%; height: 100%; object-fit: cover; }

        /* --- コントロールパネル本体 --- */
        #control-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(1px);
            border-radius: 12px;
            display: flex; flex-direction: column;
            z-index: 20; /* 目玉より確実に上に配置 */
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            width: 230px;
        }

        /* パネル移動用のドラッグハンドル */
        #panel-drag-handle {
            cursor: grab;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #222;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px 12px 0 0;
            user-select: none;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        #panel-drag-handle:active { cursor: grabbing; }

        /* パネル全体のアコーディオン */
        details.main-accordion { padding: 10px; }
        details.main-accordion summary {
            font-size: 13px; font-weight: bold; color: #222;
            cursor: pointer; outline: none; user-select: none; list-style: none;
            text-align: center;
        }
        details.main-accordion summary::-webkit-details-marker { display: none; }
        details.main-accordion summary::after { content: " ▼"; font-size: 11px; }
        details.main-accordion[open] summary::after { content: " ▲"; }
        
        /* パネルの中身のスクロール領域 */
        .panel-content {
            max-height: 55vh; /* 画面が小さい端末でもスクロールできるように */
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-section { border-bottom: 1px solid rgba(0,0,0,0.2); padding-bottom: 5px; margin-bottom: 5px; }
        .panel-title { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #222; display: flex; justify-content: space-between; align-items: center; }
        
        details.sub-accordion { border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        details.sub-accordion summary { font-size: 12px; font-weight: bold; color: #222; cursor: pointer; outline: none; user-select: none; list-style: none; }
        details.sub-accordion summary::-webkit-details-marker { display: none; }
        details.sub-accordion summary::after { content: " ▼"; font-size: 10px; float: right; margin-top: 2px; }
        details.sub-accordion[open] summary::after { content: " ▲"; }
        .sub-accordion-content { margin-top: 10px; }

        .slider-group { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: bold; color: #111; margin-bottom: 4px; }
        .slider-group input[type="range"] { width: 100px; }

        /* トグルスイッチのスタイル */
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(16px); }
        input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }

        /* --- リアル目玉シール (カプセル) --- */
        .eye {
            position: absolute;
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.12) 100%);
            border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 2px 5px 15px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.2);
            cursor: grab; transform: translate(-50%, -50%); z-index: 5; overflow: visible;
        }
        .eye::before {
            content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
            background: white; border-radius: 50%; z-index: -1; box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }
        .eye::after {
            content: ''; position: absolute; top: 15%; left: 15%; width: 30%; height: 30%;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%; filter: blur(1.5px);
            transform: rotate(-15deg); z-index: 10; pointer-events: none;
        }
        .pupil {
            position: absolute; background: black; border-radius: 50%;
            top: 50%; left: 50%; pointer-events: none; z-index: 5; box-shadow: inset 0 0 4px rgba(255,255,255,0.3);
        }

        #shutter-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; background: #fff; border: 6px solid #ddd; border-radius: 50%; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #shutter-btn:active { background: #eee; transform: translateX(-50%) scale(0.95); }
        
        #start-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; background: #ffeb3b; color: #333; font-weight: bold; }
        
        #preview-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        #preview-img { max-width: 90%; max-height: 75%; border-radius: 10px; border: 2px solid white; }
        .preview-controls { margin-top: 20px; display: flex; gap: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <video id="camera-video" autoplay playsinline></video>
    
    <div id="control-panel">
        <div id="panel-drag-handle">⠿ ドラッグして移動</div>
        
        <details class="main-accordion" open>
            <summary>設定を開閉</summary>
            <div class="panel-content">
                
                <div class="panel-section" style="background: rgba(255,255,255,0.4); padding: 8px; border-radius: 8px;">
                    <span class="panel-title">
                        自動顔認識
                        <span id="ai-status" style="font-size:9px; color:#ff5722;">モデル読込中...</span>
                    </span>
                    <div class="slider-group">
                        <label>追従モード</label>
                        <label class="switch">
                            <input type="checkbox" id="auto-track-toggle" disabled>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="panel-section" style="border:none;">
                    <span class="panel-title">全体サイズ</span>
                    <div class="slider-group"><label>カプセル</label><input type="range" id="white-slider" min="10" max="120" value="70"></div>
                    <div class="slider-group"><label>黒目(割合)</label><input type="range" id="black-ratio-slider" min="10" max="90" value="45"></div>
                </div>

                <details class="sub-accordion">
                    <summary>黒目の位置微調整</summary>
                    <div class="sub-accordion-content">
                        <div class="panel-section">
                            <span class="panel-title">左目</span>
                            <div class="slider-group"><label>左右</label><input type="range" id="lx-slider" min="-50" max="50" value="0"></div>
                            <div class="slider-group"><label>上下</label><input type="range" id="ly-slider" min="-50" max="50" value="0"></div>
                        </div>
                        <div class="panel-section" style="border:none; padding-bottom:0; margin-bottom:0;">
                            <span class="panel-title">右目</span>
                            <div class="slider-group"><label>左右</label><input type="range" id="rx-slider" min="-50" max="50" value="0"></div>
                            <div class="slider-group"><label>上下</label><input type="range" id="ry-slider" min="-50" max="50" value="0"></div>
                        </div>
                    </div>
                </details>

            </div>
        </details>
    </div>

    <div id="eye1" class="eye" style="left: 35%; top: 40%;"><div class="pupil" id="pupil1"></div></div>
    <div id="eye2" class="eye" style="left: 65%; top: 40%;"><div class="pupil" id="pupil2"></div></div>

    <button id="shutter-btn"></button>

    <div id="start-screen">
        <button id="start-btn">スタート<br><small>(カメラとセンサーの許可)</small></button>
    </div>

    <div id="preview-screen">
        <img id="preview-img" src="">
        <div class="preview-controls">
            <button id="close-btn" style="padding:10px 20px; background:#ddd; border:none; border-radius:20px;">戻る</button>
            <button id="download-btn" style="padding:10px 20px; background:#4CAF50; color:white; border:none; border-radius:20px; font-weight:bold;">保存</button>
        </div>
    </div>
</div>

<script>
    let whiteSize = 70, blackSize = 31.5;
    let offsets = [ { x: 0, y: 0 }, { x: 0, y: 0 } ];
    let faceLandmarker = null;
    let isTracking = false;
    let lastVideoTime = -1;

    const whiteSlider = document.getElementById('white-slider');
    const blackRatioSlider = document.getElementById('black-ratio-slider');
    const lxS = document.getElementById('lx-slider'); const lyS = document.getElementById('ly-slider');
    const rxS = document.getElementById('rx-slider'); const ryS = document.getElementById('ry-slider');
    const eyes = [document.getElementById('eye1'), document.getElementById('eye2')];
    const pupils = [document.getElementById('pupil1'), document.getElementById('pupil2')];
    const video = document.getElementById('camera-video');
    const trackToggle = document.getElementById('auto-track-toggle');
    const aiStatus = document.getElementById('ai-status');

    // --- パネルのドラッグ移動処理 ---
    const panel = document.getElementById('control-panel');
    const panelHandle = document.getElementById('panel-drag-handle');
    let isPanelDragging = false;
    let panelOffsetX = 0, panelOffsetY = 0;

    panelHandle.addEventListener('pointerdown', (e) => {
        isPanelDragging = true;
        panelHandle.setPointerCapture(e.pointerId);
        const rect = panel.getBoundingClientRect();
        // クリックした位置とパネル左上の座標の差分を記録
        panelOffsetX = e.clientX - rect.left;
        panelOffsetY = e.clientY - rect.top;
    });

    panelHandle.addEventListener('pointermove', (e) => {
        if (!isPanelDragging) return;
        panel.style.left = (e.clientX - panelOffsetX) + 'px';
        panel.style.top = (e.clientY - panelOffsetY) + 'px';
    });

    panelHandle.addEventListener('pointerup', (e) => {
        isPanelDragging = false;
        panelHandle.releasePointerCapture(e.pointerId);
    });
    // -----------------------------

    // AIの非同期読み込み
    async function initAI() {
        try {
            const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs");
            const { FaceLandmarker, FilesetResolver } = vision;

            const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                outputFaceBlendshapes: false,
                runningMode: "VIDEO",
                numFaces: 1
            });
            trackToggle.disabled = false;
            aiStatus.textContent = "準備完了!";
            aiStatus.style.color = "#4CAF50";
        } catch (e) {
            aiStatus.textContent = "読込エラー";
            console.error("AIモデルの読み込みに失敗しました:", e);
        }
    }
    initAI();

    trackToggle.addEventListener('change', (e) => {
        isTracking = e.target.checked;
    });

    function updateParams() {
        whiteSize = parseInt(whiteSlider.value);
        const ratio = parseInt(blackRatioSlider.value) / 100;
        blackSize = whiteSize * ratio;
        if (blackSize > whiteSize - 4) blackSize = Math.max(2, whiteSize - 4);

        offsets[0].x = (parseInt(lxS.value) / 100) * whiteSize; offsets[0].y = (parseInt(lyS.value) / 100) * whiteSize;
        offsets[1].x = (parseInt(rxS.value) / 100) * whiteSize; offsets[1].y = (parseInt(ryS.value) / 100) * whiteSize;

        eyes.forEach(eye => { eye.style.width = whiteSize + 'px'; eye.style.height = whiteSize + 'px'; });
        pupils.forEach(pupil => {
            pupil.style.width = blackSize + 'px'; pupil.style.height = blackSize + 'px';
            pupil.style.marginTop = -(blackSize / 2) + 'px'; pupil.style.marginLeft = -(blackSize / 2) + 'px';
        });
    }
    [whiteSlider, blackRatioSlider, lxS, lyS, rxS, ryS].forEach(s => s.addEventListener('input', updateParams));
    updateParams();

    function makeDraggable(el) {
        let isDragging = false;
        el.addEventListener('pointerdown', (e) => { if(isTracking) return; isDragging = true; el.setPointerCapture(e.pointerId); });
        el.addEventListener('pointermove', (e) => {
            if (!isDragging || isTracking) return;
            el.style.left = e.clientX + 'px'; el.style.top = e.clientY + 'px';
        });
        el.addEventListener('pointerup', (e) => { isDragging = false; el.releasePointerCapture(e.pointerId); });
    }
    eyes.forEach(makeDraggable);

    let ax = 0, ay = 0;
    const physicsData = [ { x: 0, y: 0, vx: 0, vy: 0 }, { x: 0, y: 0, vx: 0, vy: 0 } ];
    window.addEventListener('devicemotion', (e) => {
        if (e.acceleration) { ax = e.acceleration.x || 0; ay = e.acceleration.y || 0; }
    });

    function renderLoop() {
        if (isTracking && faceLandmarker && video.readyState >= 2) {
            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, startTimeMs);
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const personRightEyeLM = landmarks[468];
                    const personLeftEyeLM = landmarks[473];
                    
                    updateEyePosition(eyes[0], personRightEyeLM);
                    updateEyePosition(eyes[1], personLeftEyeLM);
                }
            }
        }

        const maxRadius = (whiteSize - blackSize) / 2;
        for (let i = 0; i < 2; i++) {
            let p = physicsData[i];
            p.vx -= ax * 1.5; p.vy += ay * 1.5;
            p.vx -= (p.x - offsets[i].x) * 0.1; p.vy -= (p.y - offsets[i].y) * 0.1;
            p.vx *= 0.8; p.vy *= 0.8;
            p.x += p.vx; p.y += p.vy;

            const dist = Math.hypot(p.x, p.y);
            if (dist > maxRadius) {
                p.x = (p.x / dist) * maxRadius; p.y = (p.y / dist) * maxRadius;
                p.vx *= -0.4; p.vy *= -0.4;
            }
            pupils[i].style.transform = `translate(${p.x}px, ${p.y}px)`;
        }
        requestAnimationFrame(renderLoop);
    }

    function updateEyePosition(eyeElement, landmark) {
        const rect = document.getElementById('app-container').getBoundingClientRect();
        const vRatio = video.videoWidth / video.videoHeight;
        const cRatio = rect.width / rect.height;
        let rWidth, rHeight, ox, oy;

        if (vRatio > cRatio) { rHeight = rect.height; rWidth = rect.height * vRatio; ox = (rect.width - rWidth) / 2; oy = 0; }
        else { rWidth = rect.width; rHeight = rect.width / vRatio; ox = 0; oy = (rect.height - rHeight) / 2; }

        const mappedX = ox + landmark.x * rWidth;
        const mappedY = oy + landmark.y * rHeight;

        eyeElement.style.left = mappedX + 'px';
        eyeElement.style.top = mappedY + 'px';
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
        } catch(err) { alert('カメラエラー: ' + err.message); }
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
        }
        document.getElementById('start-screen').style.display = 'none';
        startCamera();
        requestAnimationFrame(renderLoop);
    });

    document.getElementById('shutter-btn').addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        const rect = document.getElementById('app-container').getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        const ctx = canvas.getContext('2d');

        const vRatio = video.videoWidth / video.videoHeight;
        const cRatio = canvas.width / canvas.height;
        let dw, dh, ox, oy;
        if (vRatio > cRatio) { dh = canvas.height; dw = canvas.height * vRatio; ox = (canvas.width - dw) / 2; oy = 0; }
        else { dw = canvas.width; dh = canvas.width / vRatio; ox = 0; oy = (canvas.height - dh) / 2; }
        
        ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, ox, oy, dw, dh);

        for (let i = 0; i < 2; i++) {
            const eyeRect = eyes[i].getBoundingClientRect();
            const cx = eyeRect.left + eyeRect.width / 2;
            const cy = eyeRect.top + eyeRect.height / 2;
            const radius = whiteSize / 2;

            ctx.save(); ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; ctx.filter = 'blur(4px)'; ctx.beginPath(); ctx.arc(cx + 2, cy + 4, radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(cx, cy, radius - 1, 0, Math.PI * 2); ctx.fill();
            
            ctx.save();
            const capGrad = ctx.createRadialGradient(cx - radius*0.3, cy - radius*0.3, radius*0.1, cx, cy, radius);
            capGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)'); capGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0)'); capGrad.addColorStop(1, 'rgba(0, 0, 0, 0.08)');
            ctx.fillStyle = capGrad; ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            const px = cx + physicsData[i].x; const py = cy + physicsData[i].y;
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(px, py, blackSize / 2, 0, Math.PI * 2); ctx.fill();
            ctx.save(); ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.beginPath(); ctx.arc(px - blackSize*0.2, py - blackSize*0.2, blackSize * 0.2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            ctx.save(); ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.filter = 'blur(1.5px)'; ctx.beginPath(); ctx.ellipse(cx - radius*0.4, cy - radius*0.4, radius*0.3, radius*0.2, -Math.PI/12, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }

        document.getElementById('preview-img').src = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('preview-screen').style.display = 'flex';
    });

    document.getElementById('close-btn').addEventListener('click', () => { document.getElementById('preview-screen').style.display = 'none'; });
    document.getElementById('download-btn').addEventListener('click', () => { const a = document.createElement('a'); a.href = document.getElementById('preview-img').src; a.download = 'ar_eye_sticker.jpg'; a.click(); });
</script>
</body>
</html>
